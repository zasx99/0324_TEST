<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>교통사고를 당했는데 눈 떠보니 예루살렘이라니요!?</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: rgba(255,255,255,0.88);
      --text: #1c2430;
      --muted: #64748b;
      --line: #d9e2ef;
      --accent: #3b82f6;
      --accent-2: #8b5cf6;
      --good: #16a34a;
      --bad: #dc2626;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: linear-gradient(180deg, #eef6ff 0%, #fdfcff 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 14px 12px 18px;
      gap: 10px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .pill {
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    .title {
      background: linear-gradient(135deg, #fff, #f4f0ff);
      border: 1px solid #e9e8ff;
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 21px;
      line-height: 1.4;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .subtitle {
      margin: 0;
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
    }

    .scene {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      min-height: 290px;
      background: #dbeafe;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.6);
    }

    .scene-art {
      aspect-ratio: 1 / 1;
      width: 100%;
      height: auto;
      padding: 20px;
      display: flex;
      align-items: stretch;
      justify-content: center;
      position: relative;
      color: white;
    }

    .scene-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.22) 100%);
      pointer-events: none;
    }

    .art-content {
      width: 100%;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .art-tag {
      align-self: flex-start;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(8px);
    }

    .art-emoji {
      font-size: 68px;
      text-align: center;
      margin: auto 0;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.18));
    }

    .art-caption {
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 8px rgba(0,0,0,0.22);
    }

    .dialogue {
      margin-top: -18px;
      position: relative;
      z-index: 3;
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .speaker {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-2);
      margin-bottom: 8px;
    }

    .bubble {
      min-height: 84px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      line-height: 1.75;
      font-size: 16px;
      word-break: keep-all;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .controls, .quiz-actions, .start-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      appearance: none;
      border: none;
      background: white;
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      cursor: pointer;
      flex: 1;
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border: none;
    }

    button.ghost {
      background: #ffffffcc;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .letters {
      background: linear-gradient(135deg, #fff, #fff7ed);
      border: 1px solid #fde7c3;
      border-radius: 22px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .letters h2, .quiz-card h2, .result-card h2 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .letter-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 6px;
    }

    .letter-cell {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border: 1px dashed #f0b978;
      border-radius: 12px;
      font-weight: 800;
      font-size: 15px;
    }

    .letter-cell.empty {
      color: #cbd5e1;
    }

    .letter-note {
      margin-top: 10px;
      font-size: 12px;
      color: #8a5a1d;
      line-height: 1.5;
    }

    .quiz-card, .result-card {
      background: linear-gradient(135deg, #ffffff, #f8fbff);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .question {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .choice-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice {
      text-align: left;
      background: white;
      border: 1px solid var(--line);
    }

    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 14px;
      font-size: 16px;
      outline: none;
      background: white;
    }

    .hint-box {
      margin-top: 12px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      padding: 12px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .feedback {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
    }

    .feedback.good {
      background: #ecfdf3;
      border: 1px solid #bbf7d0;
      color: #166534;
    }

    .feedback.bad {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .hidden { display: none; }

    .credits {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding-bottom: 8px;
    }

    .ending-box {
      margin-top: 12px;
      background: linear-gradient(135deg, #eff6ff, #f5f3ff);
      border: 1px solid #ddd6fe;
      border-radius: 18px;
      padding: 14px;
      line-height: 1.7;
      font-size: 15px;
    }
  
    /* 파티클 레이어 (시작 화면 전용) */
    .particle-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle-layer span {
      position: absolute;
      width: 30px;
      height: 30px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: floatUp 8s linear infinite;
      opacity: 0.6;
    }
    .particle-layer span:nth-child(1) { left:10%; top:80%; animation-duration:9s; }
    .particle-layer span:nth-child(2) { left:25%; top:90%; animation-duration:7s; }
    .particle-layer span:nth-child(3) { left:40%; top:85%; animation-duration:8s; }
    .particle-layer span:nth-child(4) { left:55%; top:95%; animation-duration:10s; }
    .particle-layer span:nth-child(5) { left:70%; top:88%; animation-duration:9s; }
    .particle-layer span:nth-child(6) { left:85%; top:92%; animation-duration:7s; }
    .particle-layer span:nth-child(7) { left:15%; top:100%; animation-duration:8s; }
    .particle-layer span:nth-child(8) { left:35%; top:98%; animation-duration:9s; }
    .particle-layer span:nth-child(9) { left:60%; top:100%; animation-duration:11s; }
    .particle-layer span:nth-child(10){ left:80%; top:97%; animation-duration:8s; }

    @keyframes floatUp {
      0% { transform: translateY(100%) scale(0.8); opacity:0; }
      20% { opacity:0.7; }
      100% { transform: translateY(-120%) scale(1.2); opacity:0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="pill" id="progressPill">스토리 1 / 10</div>
      <div class="pill" id="modePill">오프닝</div>
    </div>

    <section class="title" id="titleSection">
      <h1>교통사고를 당했는데<br>눈 떠보니 예루살렘이라니요!?</h1>
    </section>

    <section class="result-card" id="startSection">

        </h1>

      <div style="position:relative; border-radius:18px; overflow:hidden; border:1px solid var(--line); margin-bottom:16px; background:#fff;">
        <img src="./images/1.png" alt="1번 이미지" style="display:block; width:100%; height:auto;" />
        <div class="particle-layer">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>

      <div class="start-actions">
        <button class="primary" id="startBtn">게임 시작</button>
      </div>
    </section>

    <section id="storySection" class="hidden">
      <div class="scene">
        <div class="scene-art" id="sceneArt">
          <div class="scene-overlay"></div>
          <div class="art-content">
            <div class="art-tag" id="artTag">프롤로그</div>

      <div class="dialogue">

          <span id="lineCounter">대화 1 / 4</span>
          <span>짧게 읽고, 천천히 넘어가세요</span>
        </div>
        <div class="controls">
          <button class="ghost" id="prevBtn">◀ 이전</button>
          <button class="primary" id="nextBtn">다음 ▶</button>
        </div>
      </div>
    </section>

    <section class="letters hidden" id="lettersSection">
      <h2>획득한 단서</h2>
      <div class="letter-grid" id="letterGrid"></div>
      <div class="letter-note" id="letterNote">각 퀴즈를 풀면 정답 조합에 필요한 단서를 하나씩 얻습니다. 순서는 섞여 있습니다.</div>
    </section>

    <section class="quiz-card hidden" id="quizSection">
      <div style="display:flex; gap:8px; margin-bottom:10px;">
        <button class="ghost" id="quizPrevBtn">◀ 이전 (스토리)</button>
      </div>
      <h2>퀴즈</h2>
      <div class="question" id="quizQuestion"></div>
      <div id="quizBody"></div>
      <div class="feedback hidden" id="quizFeedback"></div>
      <div class="quiz-actions hidden" id="quizNextWrap">
        <button class="primary" id="quizNextBtn">다음 ▶</button>
      </div>
    </section>

    <section class="result-card hidden" id="finalSection">
      <h2>최종 정답</h2>
      <div class="question">지금까지 모은 단서를 조합해 마지막 정답을 입력하세요.</div>
      <input class="input" id="finalInput" placeholder="정답을 입력하세요" />
      <div class="quiz-actions">
        <button class="primary" id="finalSubmit">최종 정답 제출</button>
      </div>
      
      <div class="feedback hidden" id="finalFeedback"></div>
      <div class="ending-box hidden" id="endingBox"></div>
    </section>

    <div id="pageNumber" style="text-align:center; font-size:12px; color:#94a3b8; margin-top:6px;"></div>
    <div class="credits">모바일 화면에 맞춰 제작된 싱글 파일 HTML 게임</div>
  </div>

        tag: '8단계',
        emoji: '🪨',
        caption: '무덤 앞에는 무거운 돌문이 놓여 있었다.',
        speaker: '주인공',
        lines: [
          '시간이 흐른 뒤, 사람들은 예수님이 놓인 무덤을 이야기했다.',
          '나도 그 무덤이 있는 곳으로 향했다.',
          '커다란 돌문이 무덤 입구를 가로막고 있었다.'
        ],
        quiz: { type: 'choice', question: '아버지와 아들이 사고. 의사가 “이 사람은 내 아들”이라 말한 이유는?', choices: ['거짓말','의사가 엄마','쌍둥이','우연'], answer: '의사가 엄마' }
      },
      {
        tag: '9단계',
        emoji: '✨',
        caption: '끝난 줄 알았던 이야기는 여기서 다시 시작된다.',
        speaker: '주인공',
        lines: [
          '이른 새벽, 다시 그 무덤 쪽이 소란스러워졌다.',
          '돌문은 열려 있었고, 안은 비어 있었다.',
          '사람들은 믿을 수 없다는 표정으로 서로를 바라봤다.',
          '그리고 나는, 이것이 끝이 아니라는 걸 깨달았다.'
        ],
        quiz: { type: 'choice', question: '다음 중 100이 되는 것은?', choices: ['50+50','40+60','70+20','30+30'], answer: '50+50' }
      },
      {
        tag: '엔딩',
        emoji: '⛪',
        caption: '모든 장면이 지나간 뒤, 다시 익숙한 현실이 돌아온다.',
        speaker: '주인공',
        lines: [
          '눈앞이 다시 새하얘졌다.',
          '정신을 차려보니 나는 교회 안에 앉아 있었다.',
          '방금까지의 일들이 꿈처럼 멀어지는 것 같았다.',
          '하지만 내 손에는 분명, 모아 온 단서의 감각이 남아 있었다.'
        ]
      }
    ];

    const rewardMap = [
      'J', 'E', 'S', 'U', 'E', 'L', 'V', 'O', 'S', ' '
    ];

    // 사용자가 획득하는 실제 순서(섞여 있음)
    // 사용자가 획득하는 실제 순서(섞여 있음)
    const rewardsByQuizIndex = {
      1: 'L',
      2: 'O',
      3: 'J',
      4: 'S',
      5: 'E',
      6: 'V',
      7: 'U',
      8: 'S',
      9: 'E'
    };

    const state = {
      sceneIndex: 0,
      lineIndex: 0,
      quizMode: false,
      solvedScenes: new Set(),
      collected: [],
      finalSolved: false
    };

    const startSection = document.getElementById('startSection');
    const storySection = document.getElementById('storySection');
    const quizSection = document.getElementById('quizSection');
    const finalSection = document.getElementById('finalSection');
    const bubble = document.getElementById('bubble');
    const speaker = document.getElementById('speaker');
    const lineCounter = document.getElementById('lineCounter');
    const progressPill = document.getElementById('progressPill');
    const modePill = document.getElementById('modePill');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const artTag = document.getElementById('artTag');
    const artEmoji = document.getElementById('artEmoji');
    const artCaption = document.getElementById('artCaption');
    const sceneArt = document.getElementById('sceneArt');
    const letterGrid = document.getElementById('letterGrid');
    const letterNote = document.getElementById('letterNote');
    const quizQuestion = document.getElementById('quizQuestion');
    const quizBody = document.getElementById('quizBody');
    const quizHint = document.getElementById('quizHint');
    const quizFeedback = document.getElementById('quizFeedback');
    const quizNextWrap = document.getElementById('quizNextWrap');
    const quizNextBtn = document.getElementById('quizNextBtn');
    const finalInput = document.getElementById('finalInput');
    const finalSubmit = document.getElementById('finalSubmit');
    const finalFeedback = document.getElementById('finalFeedback');
    const endingBox = document.getElementById('endingBox');
    const startBtn = document.getElementById('startBtn');
    const pageNumberEl = document.getElementById('pageNumber');
    const quizPrevBtn = document.getElementById('quizPrevBtn');

    function normalize(value) {
      return String(value).replace(/\s+/g, '').trim().toLowerCase();
    }

    function getSceneGradient(index) {
      const gradients = [
        'linear-gradient(135deg, #60a5fa, #a78bfa)',
        'linear-gradient(135deg, #64748b, #0f172a)',
        'linear-gradient(135deg, #f59e0b, #ef4444)',
        'linear-gradient(135deg, #f97316, #7c2d12)',
        'linear-gradient(135deg, #6b7280, #111827)',
        'linear-gradient(135deg, #1f2937, #000000)',
        'linear-gradient(135deg, #334155, #0f172a)',
        'linear-gradient(135deg, #f59e0b, #fde68a)',
        'linear-gradient(135deg, #60a5fa, #8b5cf6)',
        'linear-gradient(135deg, #22c55e, #3b82f6)'
      ];
      return gradients[index % gradients.length];
    }

    function renderLetters() {
      letterGrid.innerHTML = '';
      const total = 9;
      const display = Array(total).fill('');
      state.collected.forEach((char, idx) => {
        display[idx] = char;
      });

      for (let i = 0; i < total; i++) {
        const cell = document.createElement('div');
        cell.className = 'letter-cell' + (display[i] ? '' : ' empty');
        cell.textContent = display[i] || '?';
        letterGrid.appendChild(cell);
      }

      letterNote.textContent = state.finalSolved
        ? '정답을 완성했습니다. JESUS LOVE.'
        : `현재 ${state.collected.length}개의 단서를 모았습니다. 순서는 뒤섞여 있으니 마지막에 조합해 보세요.`;
    }

    function showStart() {
      startSection.classList.remove('hidden');
      storySection.classList.add('hidden');
      quizSection.classList.add('hidden');
      finalSection.classList.add('hidden');
      document.getElementById('titleSection').classList.add('hidden');
      document.getElementById('lettersSection').classList.add('hidden');
      progressPill.textContent = '게임 준비';
      modePill.textContent = '시작 화면';
      pageNumberEl.textContent = '1번 페이지';
    }

    function getPageNumber() {
      let page = 2;
      for (let i = 0; i < state.sceneIndex; i++) {
        page += storyData[i].lines.length;
      }
      page += state.lineIndex;
      return page;
    }

    function renderStory() {
      const pageNumber = getPageNumber();
      pageNumberEl.textContent = `${pageNumber}번 페이지`;
      const lettersSection = document.getElementById('lettersSection');
      if (state.sceneIndex >= 2) {
        lettersSection.classList.remove('hidden');
      } else {
        lettersSection.classList.add('hidden');
      }
      document.getElementById('titleSection').classList.remove('hidden');
      startSection.classList.add('hidden');

      const scene = storyData[state.sceneIndex];
      const line = scene.lines[state.lineIndex];

      storySection.classList.remove('hidden');
      quizSection.classList.add('hidden');
      finalSection.classList.add('hidden');

      progressPill.textContent = `스토리 ${state.sceneIndex + 1} / ${storyData.length}`;
      modePill.textContent = scene.quiz && state.lineIndex === scene.lines.length - 1 && !state.solvedScenes.has(state.sceneIndex)
        ? '퀴즈 대기'
        : '스토리 진행';

      speaker.textContent = scene.speaker;
      bubble.textContent = line;
      lineCounter.textContent = `대화 ${state.lineIndex + 1} / ${scene.lines.length}`;
      artTag.textContent = `${scene.tag} · 이미지 ${pageNumber}`;
      artEmoji.textContent = pageNumber;
      artCaption.textContent = scene.caption;
      // 이미지 자동 연결 (없으면 그라데이션)
      const imgPath = `./images/${pageNumber}.png`;
      const testImg = new Image();
      testImg.src = imgPath;
      testImg.onload = () => {
        sceneArt.style.backgroundImage = `url('${imgPath}')`;
        sceneArt.style.backgroundSize = 'cover';
        sceneArt.style.backgroundPosition = 'center';
      };
      testImg.onerror = () => {
        sceneArt.style.backgroundImage = 'none';
        sceneArt.style.background = getSceneGradient(state.sceneIndex);
      };

      prevBtn.disabled = state.sceneIndex === 0 && state.lineIndex === 0;

      const atLastLine = state.lineIndex === scene.lines.length - 1;
      const hasQuiz = !!scene.quiz;
      const solved = state.solvedScenes.has(state.sceneIndex);

      if (atLastLine && hasQuiz && !solved) {
        nextBtn.textContent = '문제 풀기 🧩';
      } else if (state.sceneIndex === storyData.length - 1 && atLastLine) {
        nextBtn.textContent = '최종 정답으로 ▶';
      } else {
        nextBtn.textContent = '다음 ▶';
      }
    }

    function renderQuiz() {
      const pageNumber = getPageNumber();
      pageNumberEl.textContent = `${pageNumber}번 페이지`;
      quizPrevBtn.onclick = () => {
        quizSection.classList.add('hidden');
        renderStory();
      };
      const scene = storyData[state.sceneIndex];
      const quiz = scene.quiz;
      if (!quiz) return;

      storySection.classList.add('hidden');
      quizSection.classList.remove('hidden');
      finalSection.classList.add('hidden');
      progressPill.textContent = `퀴즈 ${state.solvedScenes.size + 1}`;
      modePill.textContent = '문제 풀이';
      quizQuestion.textContent = quiz.question;
      quizFeedback.classList.add('hidden');
      quizNextWrap.classList.add('hidden');
      quizBody.innerHTML = '';

      if (quiz.type === 'choice') {
        const list = document.createElement('div');
        list.className = 'choice-list';
        quiz.choices.forEach(choiceText => {
          const btn = document.createElement('button');
          btn.className = 'choice';
          btn.textContent = choiceText;
          btn.onclick = () => checkAnswer(choiceText);
          list.appendChild(btn);
        });
        quizBody.appendChild(list);
      } else {
        const input = document.createElement('input');
        input.className = 'input';
        input.id = 'textAnswer';
        input.placeholder = '정답을 입력하세요';
        const actions = document.createElement('div');
        actions.className = 'quiz-actions';
        const submit = document.createElement('button');
        submit.className = 'primary';
        submit.textContent = '정답 제출';
        submit.onclick = () => checkAnswer(input.value);
        actions.appendChild(submit);
        quizBody.appendChild(input);
        quizBody.appendChild(actions);
        setTimeout(() => input.focus(), 50);
      }
    }

    function showFeedback(ok, message) {
      quizFeedback.classList.remove('hidden', 'good', 'bad');
      quizFeedback.classList.add(ok ? 'good' : 'bad');
      quizFeedback.textContent = message;
    }

    function rewardForScene(index) {
      return rewardsByQuizIndex[index] || null;
    }

    function checkAnswer(value) {
      const quiz = storyData[state.sceneIndex].quiz;
      const correct = Array.isArray(quiz.answer)
        ? quiz.answer.map(normalize).includes(normalize(value))
        : normalize(value) === normalize(quiz.answer);

      if (!correct) {
        showFeedback(false, '정답이 아닙니다.');
        return;
      }

      state.solvedScenes.add(state.sceneIndex);
      // 오프닝 퀴즈는 단서 지급 없음
      if (state.sceneIndex !== 1) {
        const reward = rewardForScene(state.sceneIndex);
        if (reward) state.collected.push(reward);
      }
      renderLetters();
      showFeedback(true, '정답입니다!');
      quizNextWrap.classList.remove('hidden');

      const textAnswer = document.getElementById('textAnswer');
      if (textAnswer) textAnswer.disabled = true;
      quizBody.querySelectorAll('button').forEach(btn => {
        btn.disabled = true;
      });
    }

    function moveNextScene() {
      const scene = storyData[state.sceneIndex];
      const atLastLine = state.lineIndex === scene.lines.length - 1;

      if (!atLastLine) {
        state.lineIndex += 1;
        renderStory();
        return;
      }

      if (scene.quiz && !state.solvedScenes.has(state.sceneIndex)) {
        renderQuiz();
        return;
      }

      if (state.sceneIndex < storyData.length - 1) {
        state.sceneIndex += 1;
        state.lineIndex = 0;
        renderStory();
      } else {
        renderFinal();
      }
    }

    function movePrev() {
      if (state.lineIndex > 0) {
        state.lineIndex -= 1;
        renderStory();
        return;
      }

      if (state.sceneIndex > 0) {
        state.sceneIndex -= 1;
        state.lineIndex = storyData[state.sceneIndex].lines.length - 1;
        renderStory();
        return;
      }

      showStart();
    }

    function renderFinal() {
      pageNumberEl.textContent = '마지막 페이지';
      // 단서 9개 모으기 전에는 진입 차단
      if (state.collected.length < 9) {
        alert('아직 모든 단서를 모으지 못했습니다.');
        state.sceneIndex = storyData.length - 2;
        state.lineIndex = 0;
        renderStory();
        return;
      }
      storySection.classList.add('hidden');
      quizSection.classList.add('hidden');
      finalSection.classList.remove('hidden');
      progressPill.textContent = '최종 단계';
      modePill.textContent = '정답 조합';
      finalFeedback.classList.add('hidden');
    }

    function submitFinal() {
      if (state.collected.length < 9) {
        finalFeedback.classList.remove('hidden');
        finalFeedback.classList.add('bad');
        finalFeedback.textContent = '단서를 모두 모아야 합니다.';
        return;
      }
      const answer = normalize(finalInput.value);
      if (answer === normalize('JESUS LOVE')) {
        state.finalSolved = true;
        renderLetters();
        finalFeedback.classList.remove('hidden', 'bad');
        finalFeedback.classList.add('good');
        finalFeedback.textContent = '정답입니다! 예루살렘에서 본 사건의 의미를 붙잡았습니다.';
        endingBox.classList.remove('hidden');
        endingBox.innerHTML = `
          꾸..꿈인가?<br>
          아.. 설교시간에 졸았나보다..<br><br>
          황범구 목사님이 어떤 쪽지를 들고 계신다.<br>
          거기로 가보자..
        `;
      } else {
        finalFeedback.classList.remove('hidden', 'good');
        finalFeedback.classList.add('bad');
        finalFeedback.textContent = '아직 아닙니다. 지금까지 모은 단서를 다시 조합해 보세요.';
      }
    }

    startBtn.addEventListener('click', renderStory);
    prevBtn.addEventListener('click', movePrev);
    nextBtn.addEventListener('click', moveNextScene);
    finalSubmit.addEventListener('click', submitFinal);
    finalInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitFinal();
    });
    quizNextBtn.addEventListener('click', () => {
      quizSection.classList.add('hidden');
      moveNextScene();
    });

    renderLetters();
    showStart();
  </script>
</body>
</html>
